version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduspark
      POSTGRES_PASSWORD: eduspark_pass
      POSTGRES_DB: eduspark
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduspark"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://eduspark:eduspark_pass@db:5432/eduspark
      JWT_SECRET: dev_jwt_secret_not_for_production
      NODE_ENV: development
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

volumes:
  pgdata_dev:
